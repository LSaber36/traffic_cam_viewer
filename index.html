<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Caltrans D3 Stream Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="main.css">
</head>
<body>

<header>
  <div class="header-row">

    <!-- Logo + title -->
    <div class="logo-icon">📡</div>
    <h1>Caltrans D3</h1>

    <!-- Size control -->
    <div class="size-control">
      <span class="size-label">Size</span>
      <input type="range" class="size-slider" id="size-slider" min="1" max="10" step="1">
      <div class="size-spinbox">
        <button class="size-spin-btn" id="btn-size-minus" title="Fewer columns">&#8722;</button>
        <input type="number" class="size-input" id="size-input" min="1" max="10">
        <button class="size-spin-btn" id="btn-size-plus" title="More columns">&#43;</button>
      </div>
    </div>

    <!-- Right cluster -->
    <div class="header-right">

      <!-- Light / Dark toggle -->
      <div class="theme-toggle">
        <span class="theme-label" id="theme-label">Dark</span>
        <div class="toggle-track" id="theme-track">
          <div class="toggle-thumb"></div>
        </div>
      </div>

      <div class="hdiv"></div>

      <!-- Stream selector -->
      <div class="selector-wrap" id="selector-wrap">
        <button class="hbtn" id="btn-streams">
          <!-- list icon -->
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8"  y1="6"  x2="21" y2="6"/>
            <line x1="8"  y1="12" x2="21" y2="12"/>
            <line x1="8"  y1="18" x2="21" y2="18"/>
            <line x1="3"  y1="6"  x2="3.01" y2="6"/>
            <line x1="3"  y1="12" x2="3.01" y2="12"/>
            <line x1="3"  y1="18" x2="3.01" y2="18"/>
          </svg>
          <span class="btn-text">Streams</span>
        </button>

        <div class="selector-panel" id="selector-panel">
          <div class="selector-header">
            <span class="selector-title">Select Streams</span>
            <button class="sel-action" id="sel-all">All</button>
            <button class="sel-action" id="sel-none">None</button>
          </div>
          <div class="selector-search">
            <input class="sel-search-input" id="sel-search"
                   placeholder="Filter by name…" type="search" autocomplete="off">
          </div>
          <div class="selector-list" id="selector-list"></div>
          <div class="selector-footer">
            <span class="sel-count" id="sel-count">0 selected</span>
            <button class="sel-apply" id="sel-apply">Apply</button>
          </div>
        </div>
      </div>

      <div class="hdiv"></div>

      <!-- Refresh all -->
      <button class="hbtn" id="btn-refresh-all" title="Refresh all streams">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
        </svg>
        <span class="btn-text">Refresh</span>
      </button>

      <!-- Play / Pause all -->
      <button class="hbtn" id="btn-play-all" title="Play / Pause all">
        <svg id="play-all-icon" width="11" height="11" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        <span class="btn-text" id="play-all-label">Play All</span>
      </button>

    </div><!-- /header-right -->
  </div><!-- /header-row -->
</header>

<!-- Click-outside backdrop for selector panel -->
<div class="backdrop" id="backdrop"></div>

<main>
  <div id="grid">
    <div id="empty" style="display:block">Loading streams…</div>
  </div>
</main>

<!-- Load streams data first, then app logic -->
<script src="streams.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="main.js"></script>
</body>
</html>
