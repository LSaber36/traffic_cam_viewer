<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Traffic Cam Viewer</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Stylesheets (order matters: base first, then components) -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/selector.css">
  <link rel="stylesheet" href="css/grid.css">
  <link rel="stylesheet" href="css/card.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     HEADER / NAV BAR
════════════════════════════════════════════════════════════ -->
<header>
  <div class="header-row">

    <!-- Logo + title -->
    <div class="logo-icon">📡</div>
    <h1>Traffic Cam Viewer</h1>

    <!-- Stream Size control -->
    <div class="size-control">
      <span class="size-label">Stream Size</span>
      <input type="range" class="size-slider" id="size-slider" min="1" max="5" step="1">
      <input type="number" class="size-input" id="size-input" min="1" max="5" style="display:none">
      <div class="size-spinbox">
        <button class="size-spin-btn" id="btn-size-minus" title="Smaller streams">&#8722;</button>
        <input type="number" class="size-input" id="size-display" min="1" max="5">
        <button class="size-spin-btn" id="btn-size-plus"  title="Larger streams">&#43;</button>
      </div>
    </div>

    <!-- Right action cluster -->
    <div class="header-right">

      <!-- Light / Dark mode toggle -->
      <div class="theme-toggle">
        <span class="theme-label" id="theme-label">Dark</span>
        <div class="toggle-track" id="theme-track">
          <div class="toggle-thumb"></div>
        </div>
      </div>

      <div class="hdiv"></div>

      <!-- Streams button (panel is at body level, not here) -->
      <button class="hbtn" id="btn-streams" title="Select streams">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="8"  y1="6"  x2="21" y2="6"/>
          <line x1="8"  y1="12" x2="21" y2="12"/>
          <line x1="8"  y1="18" x2="21" y2="18"/>
          <line x1="3"  y1="6"  x2="3.01" y2="6"/>
          <line x1="3"  y1="12" x2="3.01" y2="12"/>
          <line x1="3"  y1="18" x2="3.01" y2="18"/>
        </svg>
        <span class="btn-text">Streams</span>
      </button>

      <div class="hdiv"></div>

      <!-- Refresh all streams -->
      <button class="hbtn" id="btn-refresh-all" title="Refresh all streams">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
        </svg>
        <span class="btn-text">Refresh</span>
      </button>

      <!-- Global Play / Pause all -->
      <button class="hbtn" id="btn-play-all" title="Play or pause all streams">
        <svg id="play-all-icon" width="11" height="11"
             viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        <span class="btn-text" id="play-all-label">Play All</span>
      </button>

    </div><!-- /header-right -->
  </div><!-- /header-row -->
</header>

<!-- ═══════════════════════════════════════════════════════════
     BACKDROP — blocks page while selector is open.
     Must come before selector-panel in DOM so panel is on top.
════════════════════════════════════════════════════════════ -->
<div class="backdrop" id="backdrop"></div>

<!-- ═══════════════════════════════════════════════════════════
     SELECTOR PANEL — lives at body level so it is NOT trapped
     inside the header's backdrop-filter stacking context.
════════════════════════════════════════════════════════════ -->
<div class="selector-panel" id="selector-panel">

  <!-- District + County dropdowns -->
  <div class="selector-dropdowns">
    <div class="sel-dropdown-group">
      <label class="sel-dropdown-label" for="sel-district">District</label>
      <select class="sel-dropdown" id="sel-district"></select>
    </div>
    <div class="sel-dropdown-group">
      <label class="sel-dropdown-label" for="sel-county">County</label>
      <select class="sel-dropdown" id="sel-county">
        <option value="">— select district first —</option>
      </select>
    </div>

    <!-- Longitude filter -->
    <div class="sel-lon-row">
      <input type="checkbox" class="sel-lon-checkbox" id="sel-lon-enabled">
      <label class="sel-dropdown-label" for="sel-lon-enabled">Longitude</label>
      <div class="sel-lon-inputs">
        <div class="sel-lon-group">
          <label class="sel-lon-label" for="sel-lon-min">Min</label>
          <input type="number" class="sel-lon-input" id="sel-lon-min" step="0.0001">
        </div>
        <div class="sel-lon-group">
          <label class="sel-lon-label" for="sel-lon-max">Max</label>
          <input type="number" class="sel-lon-input" id="sel-lon-max" step="0.0001">
        </div>
      </div>
    </div>
  </div>

  <!-- Select All + Search -->
  <div class="selector-search">
    <span class="sel-dropdown-label" style="padding-bottom:2px">Traffic Cams</span>
    <input class="sel-search-input" id="sel-search"
           type="search" placeholder="Filter by name…"
           autocomplete="off">
    <div class="sel-all-row" id="sel-all-row">
      <input type="checkbox" class="sel-all-checkbox" id="sel-all-cb">
      <span class="sel-all-label">Select All</span>
    </div>
  </div>

  <!-- Scrollable stream list -->
  <div class="selector-list" id="selector-list"></div>

  <!-- Footer: count + Apply -->
  <div class="selector-footer">
    <span class="sel-count" id="sel-count">0 selected</span>
    <button class="sel-apply" id="sel-apply">Apply</button>
  </div>

</div><!-- /selector-panel -->

<!-- ═══════════════════════════════════════════════════════════
     MISSING FILE POPUP
════════════════════════════════════════════════════════════ -->
<div class="popup-overlay" id="popup-overlay">
  <div class="popup-box">
    <div class="popup-icon">📂</div>
    <div class="popup-title">File Not Found</div>
    <div class="popup-msg">
      The traffic cam data file could not be loaded.<br>
      Make sure the following file exists in the same folder as <code>index.html</code>:
    </div>
    <div class="popup-code" id="popup-filename">traffic_cams.csv</div>
    <div class="popup-msg">
      Refresh the page after placing the file.
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     MAIN GRID AREA
════════════════════════════════════════════════════════════ -->
<main>
  <div id="grid">
    <div id="empty" style="display:block">Loading streams&hellip;</div>
  </div>
</main>

<!--
     Load order:
       1. hls.js          — HLS playback engine (CDN)
       2. js/config.js    — constants (DEFAULT_DISTRICT, DEFAULT_COUNTY, etc.)
       3. js/streams.js   — fetches district chart, builds CALTRANS_DISTRICTS, loads default county
       4. js/cards.js     — escHtml, escAttr, buildCard, activePlayers
       5. js/navbar.js    — size control, theme, play/pause/refresh
       6. js/selector.js  — stream selector panel, enabledSet
       7. js/render.js    — showMissingFilePopup, renderGrid, boot
-->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="js/config.js"></script>
<script src="js/streams.js"></script>
<script src="js/cards.js"></script>
<script src="js/navbar.js"></script>
<script src="js/selector.js"></script>
<script src="js/render.js"></script>

</body>
</html>
