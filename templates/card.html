<!-- ═══════════════════════════════════════════════════════════
     templates/card.html
     Inner HTML template for a single stream card.
     Placeholders replaced by cards.js:
       {{PREVIEW_IMG}}  — <img> tag or empty string
       {{NAME}}         — escaped stream name
       {{SUB}}          — escaped subtitle line or empty string
════════════════════════════════════════════════════════════ -->

<div class="video-wrap">
  {{PREVIEW_IMG}}
  <video playsinline muted></video>

  <div class="video-placeholder">
    <div class="play-circle">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="#fff">
        <polygon points="6,3 20,12 6,21"/>
      </svg>
    </div>
  </div>

  <div class="spinner">
    <div class="spin-ring"></div>
  </div>

  <div class="live-badge">
    <div class="live-dot"></div>LIVE
  </div>

  <div class="error-overlay">
    <div class="err-icon">&#9888;</div>
    <div>Stream unavailable<br>or CORS restricted</div>
    <button class="retry-btn">Retry</button>
  </div>
</div>

<div class="card-info">
  <div class="card-name-block">
    <div class="stream-name">{{NAME}}</div>
    {{SUB}}
  </div>
  <div class="card-btns">
    <button class="cbtn btn-refresh-card" title="Refresh this stream">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
      </svg>
    </button>
    <button class="cbtn btn-play-card">&#9654;</button>
  </div>
</div>
